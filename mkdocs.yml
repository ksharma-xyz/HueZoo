site_name: Huezoo
site_url: https://ksharma-xyz.github.io/FunWithColors/
site_author: ksharma-xyz
site_description: A color-matching game for curious minds.

repo_name: ksharma-xyz/FunWithColors
repo_url: https://github.com/ksharma-xyz/FunWithColors
edit_uri: ""

theme:
  name: material
  palette:
    - scheme: slate
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Privacy Policy: privacy-policy.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/ksharma-xyz
  generator: false

copyright: Copyright &copy; 2025 ksharma-xyz
