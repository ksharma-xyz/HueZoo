name: Distribute TestFlight

on:
  workflow_call:
    inputs:
      artifact-name:
        required: false
        type: string
      notify-testers:
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      notify-testers:
        description: 'Notify external testers after upload'
        required: false
        default: false
        type: boolean

jobs:
  distribute:
    runs-on: macos-latest
    environment: Firebase
    permissions:
      actions: write  # required to write back IOS_BUILD_NUMBER repo variable
    env:
      # Fastlane auto-detects these — no temp .p8 file needed.
      APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
      APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
      # Prevent xcodebuild settings query from timing out on slow CI runners.
      FASTLANE_XCODEBUILD_SETTINGS_TIMEOUT: 120
    steps:
      - uses: actions/checkout@v4

      # Select Xcode before anything else runs.
      # xcversion is not used — relies on the sunsetted xcode-install gem
      # and is broken on macos-15 runners (fastlane/fastlane#29469).
      - name: Set up Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '~26'  # Xcode 26+ required: iOS 26 SDK mandatory for App Store uploads from April 28 2026

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 21

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Firebase iOS - GoogleService-Info.plist
        env:
          DATA: ${{ secrets.FIREBASE_IOS_GOOGLE_INFO }}
        run: echo "$DATA" | base64 -d > iosApp/iosApp/GoogleService-Info.plist

      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_SIGNING_KEY_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_SIGNING_KEY_PASSWORD }}

      - name: Download Provisioning Profiles
        uses: Apple-Actions/download-provisioning-profiles@v3
        with:
          bundle-id: xyz.ksharma.huezoo
          profile-type: IOS_APP_STORE
          issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
          api-key-id: ${{ secrets.APPSTORE_KEY_ID }}
          api-private-key: ${{ secrets.APPSTORE_PRIVATE_KEY }}

      # Resolve Swift Packages before Fastlane runs so xcodebuild doesn't try to
      # resolve dependencies while signing settings are active (causes silent failure).
      - name: Resolve Swift Packages
        run: |
          cd iosApp
          xcodebuild -resolvePackageDependencies -scheme iosApp -project iosApp.xcodeproj

      # Derive the next build number using scripts/ios_next_build_number.py.
      # Strategy: next = max(asc_latest, github_floor) + 1
      #   - ASC is the ground truth for what Apple has already accepted
      #     (covers manual uploads that CI doesn't know about).
      #   - The GitHub variable acts as a monotonic floor so we never go
      #     backwards even if the ASC API returns a stale/lower value.
      - name: Set iOS build number
        env:
          GH_TOKEN: ${{ secrets.PAT_HUEZOO_GITHUB }}
          APP_STORE_CONNECT_API_KEY_KEY_ID: ${{ secrets.APPSTORE_KEY_ID }}
          APP_STORE_CONNECT_API_KEY_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.APPSTORE_PRIVATE_KEY }}
          ASC_APP_ID: "6761459879"
          IOS_BUILD_NUMBER_FLOOR: ${{ vars.IOS_BUILD_NUMBER }}
        run: |
          set -e
          pip3 install --quiet PyJWT cryptography

          NEXT=$(python3 scripts/ios_next_build_number.py)
          echo "IOS_BUILD_NUMBER=${NEXT}" >> $GITHUB_ENV

          # Update GitHub variable as an audit trail (best-effort, non-fatal).
          gh api \
            --method PATCH \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/variables/IOS_BUILD_NUMBER" \
            -f value="${NEXT}" \
            || echo "::warning::Could not write back IOS_BUILD_NUMBER — check PAT_HUEZOO_GITHUB scope."

      - name: Build iOS App for Release
        env:
          APP_BUNDLE_ID: xyz.ksharma.huezoo
          PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          DEVELOPMENT_TEAM: ${{ vars.DEVELOPMENT_TEAM }}
          # IOS_BUILD_NUMBER is NOT declared here — ${{ env.IOS_BUILD_NUMBER }} evaluates
          # the job-level env at parse time (always empty here) and would OVERRIDE the
          # value exported by the previous step via $GITHUB_ENV. $GITHUB_ENV propagation
          # is the correct and sufficient mechanism for step-to-step value passing.
        run: |
          set -e
          # Guard: IOS_BUILD_NUMBER must be a positive integer before we build.
          if ! [[ "$IOS_BUILD_NUMBER" =~ ^[1-9][0-9]*$ ]]; then
            echo "::error::IOS_BUILD_NUMBER='${IOS_BUILD_NUMBER}' is not a valid positive integer. Aborting build to prevent uploading an IPA with a stale build number."
            exit 1
          fi
          echo "Stamping IPA with CFBundleVersion=${IOS_BUILD_NUMBER}"
          cd iosApp
          bundle exec fastlane build_release

      - name: Upload to TestFlight
        run: |
          cd iosApp
          bundle exec fastlane upload_testflight

      - name: Upload IPA as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name || format('iosApp-release-ipa-{0}', github.run_id) }}
          path: iosApp/build/*.ipa
          retention-days: 30

      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-build-logs-${{ github.run_id }}
          path: iosApp/build/logs
          retention-days: 3
