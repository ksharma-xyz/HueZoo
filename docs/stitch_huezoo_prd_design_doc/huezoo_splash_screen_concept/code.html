<style>
        .wordmark-zoo {
            -webkit-text-stroke: 1px #00e5ff;
            color: transparent;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.4);
        }
        
        /* Simulating the kinetic vault depths without rounded corners */
        .shelf-depth {
            box-shadow: 8px 8px 0px 0px #292932;
        }

        .neon-rim-top {
            box-shadow: inset 0 1px 0 0 #00e5ff;
        }

        .bg-void {
            background-color: #080810;
        }

    body {
      min-height: max(884px, 100dvh);

<body class="bg-void text-on-surface font-body overflow-hidden h-screen w-screen flex flex-col items-center justify-center">
<!-- Top Navigation Anchor (Suppressed for Splash but logic kept for structure) -->
<!-- The Splash screen suppresses the TopAppBar and BottomNavBar as per the Semantic Shell Mandate -->
<!-- Main Canvas: The Kinetic Vault -->
<main class="relative flex flex-col items-center justify-center w-full h-full">
<!-- Abstract Background Depth Layer -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<!-- Asymmetric Light Beam -->
<div class="absolute -top-[20%] -left-[10%] w-[60%] h-[150%] bg-gradient-to-br from-primary-container/5 to-transparent rotate-12"></div>
<!-- Recessed Surface Track -->
<div class="absolute bottom-0 left-1/2 -translate-x-1/2 w-1 h-[265px] bg-gradient-to-t from-primary-container/20 to-transparent"></div>
</div>
<!-- Central Branding Anchor -->
<div class="relative z-10 flex flex-col items-center gap-8">
<!-- Large Wordmark -->
<div class="flex items-baseline select-none">
<!-- "Hue" - Solid/Machined -->
<span class="font-headline text-8xl md:text-9xl text-on-surface uppercase tracking-tighter leading-none">
                    Hue
                </span>
<!-- "Zoo" - Outline/Light -->
<span class="wordmark-zoo font-headline text-8xl md:text-9xl uppercase tracking-tighter leading-none ml-2">
                    Zoo
                </span>
</div>
<!-- Kinetic Indicator: The Loading Beam -->
<div class="w-48 h-[2px] bg-surface-container-high relative overflow-hidden">
<!-- Inner light pulse mimicking the flicker state -->
<div class="absolute inset-0 bg-primary-container shadow-[0_0_8px_#00e5ff]"></div>
</div>
<!-- Technical Label -->
<div class="mt-4">
<span class="font-label text-xs uppercase tracking-[0.3rem] text-primary-container/80 animate-pulse">
                    System.Initializing
                </span>
</div>
</div>
<!-- Environmental Rim Lighting (Bottom Decorative) -->
<div class="absolute bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-primary-container/40 to-transparent"></div>
</main>
<!-- Visual Identity Footnote -->
<div class="absolute bottom-12 left-1/2 -translate-x-1/2 opacity-20 flex items-center gap-4">
<div class="w-2 h-2 bg-primary-container"></div>
<div class="w-2 h-2 bg-secondary-container"></div>
<div class="w-2 h-2 bg-tertiary-container"></div>
</div>
