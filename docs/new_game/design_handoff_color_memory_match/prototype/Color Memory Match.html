<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Huezoo · Color Memory Match</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
<link href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600,700&display=swap" rel="stylesheet">

<style>
  :root{
    /* surfaces */
    --bg:#080810;
    --s0:#0D0D18; --s1:#12121E; --s2:#1C1C2E; --s3:#26263A; --s4:#34343F;
    /* accents */
    --cyan:#00E5FF; --magenta:#FF2D78; --yellow:#FFE600;
    --purple:#9B5DE5; --green:#00F5A0; --orange:#FF8A50;
    --threshold:#7B6FF0;
    /* text */
    --tx:#FFFFFF; --tx2:#9898BB; --tx3:#777799;
    /* fonts */
    --f-display:'Bebas Neue', 'Bebas Neue Pro', Impact, sans-serif;
    --f-title:'Clash Display', 'Space Grotesk', system-ui, sans-serif;
    --f-body:'Space Grotesk', system-ui, -apple-system, sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#0a0a14;color:var(--tx);font-family:var(--f-body);min-height:100%}
  body{
    background:
      radial-gradient(circle at 20% 0%, rgba(0,229,255,.06), transparent 55%),
      radial-gradient(circle at 80% 100%, rgba(255,45,120,.05), transparent 55%),
      #08080F;
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:32px 16px;
    overflow-x:hidden;
  }
  #root{width:100%; max-width:1400px}
  /* native scrollbar hide on inner phone screen */
  .scroll-hidden::-webkit-scrollbar{display:none}
  .scroll-hidden{scrollbar-width:none}

  /* shake keyframe (mirrors SwatchBlock ShakeX on wrong) */
  @keyframes hz-shake{
    0%,100%{transform:translateX(0)}
    15%{transform:translateX(-9px)}
    30%{transform:translateX(8px)}
    45%{transform:translateX(-6px)}
    60%{transform:translateX(5px)}
    75%{transform:translateX(-3px)}
    90%{transform:translateX(2px)}
  }
  .hz-shake{animation:hz-shake .45s cubic-bezier(.36,.07,.19,.97)}

  @keyframes hz-pulse{0%,100%{opacity:1}50%{opacity:.55}}
  .hz-pulse{animation:hz-pulse 1.4s ease-in-out infinite}

  /* hz-pop uses an inner wrapper so the animation transform doesn't override
     positioning transforms on the parent (translate(-50%,-50%) etc). */
  @keyframes hz-pop-inner{
    0%{transform:scale(.85);opacity:0}
    60%{transform:scale(1.05);opacity:1}
    100%{transform:scale(1);opacity:1}
  }
  .hz-pop-inner{animation:hz-pop-inner .42s cubic-bezier(.34,1.56,.64,1) both}

  @keyframes hz-slideup{
    0%{transform:translateY(60px) scale(.92);opacity:0}
    100%{transform:translateY(0) scale(1);opacity:1}
  }
  .hz-slideup{animation:hz-slideup .55s cubic-bezier(.16,1,.3,1) both}

  @keyframes hz-blink{0%,100%{opacity:1}50%{opacity:.25}}
  .hz-blink{animation:hz-blink 1.2s ease-in-out infinite}

  @keyframes hz-shutter-close{
    0%{transform:scaleY(0);transform-origin:top}
    100%{transform:scaleY(1);transform-origin:top}
  }
  .hz-shutter-close{animation:hz-shutter-close .4s cubic-bezier(.6,0,.4,1) forwards}

  @keyframes hz-shutter-open{
    0%{transform:scaleY(1);transform-origin:top}
    100%{transform:scaleY(0);transform-origin:top}
  }
  .hz-shutter-open{animation:hz-shutter-open .35s cubic-bezier(.6,0,.4,1) forwards}

  /* confetti particles */
  @keyframes hz-confetti{
    0%{transform:translate(0,0) rotate(0);opacity:1}
    100%{transform:translate(var(--cx),var(--cy)) rotate(var(--cr));opacity:0}
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="huezoo-ui.jsx"></script>
<script type="text/babel" src="color-memory-match.jsx"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
