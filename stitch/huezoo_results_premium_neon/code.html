<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Fredoka:wght@600;700&amp;family=Antonio:wght@700&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container": "#191923",
                        "primary-fixed": "#00e3fd",
                        "background": "#0d0d16",
                        "surface": "#0d0d16",
                        "on-surface": "#e7e4f0",
                        "tertiary-container": "#fde400",
                        "inverse-on-surface": "#55545e",
                        "primary": "#81ecff",
                        "surface-container-low": "#13121c",
                        "tertiary-fixed-dim": "#edd600",
                        "inverse-primary": "#006976",
                        "error-dim": "#d7383b",
                        "secondary-fixed-dim": "#ffadbd",
                        "secondary-dim": "#e40a65",
                        "on-error": "#490006",
                        "secondary-fixed": "#ffc2cc",
                        "on-secondary-container": "#fff5f6",
                        "on-primary-fixed-variant": "#005762",
                        "outline-variant": "#484751",
                        "primary-dim": "#00d4ec",
                        "surface-dim": "#0d0d16",
                        "surface-container-lowest": "#000000",
                        "on-tertiary-fixed": "#484000",
                        "on-secondary": "#48001b",
                        "error": "#ff716c",
                        "outline": "#76747f",
                        "on-tertiary-fixed-variant": "#675c00",
                        "secondary-container": "#bc0051",
                        "on-secondary-fixed-variant": "#a20045",
                        "on-tertiary-container": "#5c5200",
                        "on-error-container": "#ffa8a3",
                        "on-secondary-fixed": "#6d002c",
                        "error-container": "#9f0519",
                        "tertiary": "#fff2a8",
                        "surface-tint": "#81ecff",
                        "surface-bright": "#2b2b38",
                        "secondary": "#ff6c92",
                        "inverse-surface": "#fcf8ff",
                        "primary-fixed-dim": "#00d4ec",
                        "on-background": "#e7e4f0",
                        "tertiary-fixed": "#fde400",
                        "primary-container": "#00e3fd",
                        "on-primary-fixed": "#003840",
                        "tertiary-dim": "#edd600",
                        "surface-container-highest": "#252531",
                        "surface-container-high": "#1f1f2a",
                        "on-primary": "#005762",
                        "on-primary-container": "#004d57",
                        "on-tertiary": "#655b00",
                        "surface-variant": "#252531",
                        "on-surface-variant": "#acaab5"
                    },
                    fontFamily: {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Space Grotesk"],
                        "label": ["Space Grotesk"],
                        "antonio": ["Antonio"],
                        "fredoka": ["Fredoka"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .antonio-slanted {
            font-family: 'Antonio', sans-serif;
            font-style: italic;
        }
        .kinetic-glyph {
            font-style: italic;
            letter-spacing: -0.05em;
        }
        .rim-light {
            box-shadow: inset 1px 1px 0px 0px rgba(255, 255, 255, 0.1);
        }
        .neon-strike-cyan {
            box-shadow: 0 0 0 2px #81ecff, 0 0 0 4px rgba(129, 236, 255, 0.3);
        }
        .neon-strike-magenta {
            box-shadow: 0 0 0 2px #ff6c92, 0 0 0 4px rgba(255, 108, 146, 0.3);
        }
        .bottom-shelf-cyan {
            box-shadow: 0 6px 0 0 #005762;
        }
        .bottom-shelf-magenta {
            box-shadow: 0 6px 0 0 #6d002c;
        }
        .active-press:active {
            transform: translateY(4px);
            box-shadow: none !important;
        }
        .italic-tag {
            transform: skewX(-12deg);
        }
        .italic-tag span {
            transform: skewX(12deg);
            display: inline-block;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-[#080810] text-on-surface font-body min-h-screen selection:bg-primary selection:text-on-primary-container overflow-x-hidden">
<!-- Background Radial Glows -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-[20%] -left-[10%] w-[70%] h-[70%] bg-primary/10 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -right-[10%] w-[60%] h-[60%] bg-secondary/10 blur-[120px] rounded-full"></div>
</div>
<!-- Header (Shared Component: TopAppBar) -->
<header class="bg-[#0d0d16]/80 backdrop-blur-xl border-b-4 border-[#1a1a2e] shadow-[0_4px_0_0_rgba(0,0,0,0.3)] fixed top-0 z-50 flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-cyan-400 cursor-pointer hover:text-cyan-200 transition-colors active:scale-95 duration-100" data-icon="arrow_back">arrow_back</span>
<h1 class="font-headline tracking-tight font-black uppercase text-2xl italic text-cyan-400 drop-shadow-[0_0_8px_rgba(0,229,255,0.6)]">
        HU<span class="kinetic-glyph">EZ</span>OO
    </h1>
</div>
<div class="bg-surface-container-highest px-4 py-1 rounded-lg border-b-2 border-primary-dim flex items-center gap-2">
<span class="font-antonio text-cyan-400 text-lg tracking-wider">1,250</span>
<span class="font-label text-[10px] uppercase tracking-tighter text-on-surface-variant font-bold">GEMS</span>
</div>
</header>
<main class="relative z-10 max-w-2xl mx-auto px-6 pt-24 pb-32 flex flex-col items-center">
<!-- Failure Banner -->
<div class="bg-secondary text-white px-6 py-3 rounded-lg mb-12 shadow-[0_4px_0_0_#6d002c] border-2 border-white/10 w-full max-w-sm">
<h2 class="font-fredoka font-bold text-xl tracking-widest uppercase text-center">MISSION OUTCOME: FAILURE</h2>
</div>
<!-- Hero Scoreboard -->
<div class="relative w-full text-center mb-16">
<div class="absolute inset-0 bg-primary/5 blur-3xl rounded-full scale-150"></div>
<div class="antonio-slanted text-[100px] leading-none text-primary-fixed drop-shadow-[0_0_15px_rgba(0,227,253,0.5)] font-bold tracking-tighter">
                12,450 PTS
            </div>
</div>
<!-- The Sting Readout -->
<div class="w-full bg-surface-container-low rounded-2xl p-8 border-l-4 border-secondary rim-light mb-10 relative overflow-hidden">
<div class="absolute top-0 right-0 p-4 opacity-10">
<span class="material-symbols-outlined text-8xl" data-icon="error">error</span>
</div>
<div class="flex flex-col gap-2">
<div class="flex items-baseline gap-4">
<span class="antonio-slanted text-6xl text-[#FF2D78]">ΔE 1.4</span>
<span class="font-label text-secondary font-bold uppercase tracking-widest text-sm">CRITICAL DRIFT</span>
</div>
<p class="text-xl font-fredoka text-on-surface-variant leading-tight max-w-[80%]">
                    ΔE 1.4 got you. Most people tap out here. You're losing the signal.
                </p>
</div>
</div>
<!-- Breakdown Stats Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4 w-full mb-12">
<!-- Spectral Drift -->
<div class="bg-surface-container-high p-6 rounded-2xl border-b-4 border-surface-container-lowest rim-light">
<div class="flex justify-between items-start mb-4">
<div class="bg-primary text-on-primary px-3 py-1 italic-tag font-numbers text-xs font-bold uppercase tracking-widest rounded-sm">
<span>Spectral Drift</span>
</div>
<span class="material-symbols-outlined text-primary" data-icon="waves">waves</span>
</div>
<div class="font-antonio text-4xl text-on-surface">12.8%</div>
<div class="w-full h-3 bg-surface-container rounded-full mt-4 overflow-hidden">
<div class="h-full bg-primary w-[75%] shadow-[0_0_10px_#81ecff]"></div>
</div>
</div>
<!-- Neural Lag -->
<div class="bg-surface-container-high p-6 rounded-2xl border-b-4 border-surface-container-lowest rim-light">
<div class="flex justify-between items-start mb-4">
<div class="bg-tertiary text-on-tertiary px-3 py-1 italic-tag font-numbers text-xs font-bold uppercase tracking-widest rounded-sm">
<span>Neural Lag</span>
</div>
<span class="material-symbols-outlined text-tertiary" data-icon="bolt">bolt</span>
</div>
<div class="font-antonio text-4xl text-on-surface">42MS</div>
<div class="w-full h-3 bg-surface-container rounded-full mt-4 overflow-hidden">
<div class="h-full bg-tertiary w-[40%] shadow-[0_0_10px_#fff2a8]"></div>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col w-full gap-6">
<button class="w-full bg-gradient-to-b from-primary to-primary-dim py-6 rounded-xl text-on-primary font-headline text-2xl font-black uppercase tracking-widest bottom-shelf-cyan active-press neon-strike-cyan transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined text-3xl" data-icon="play_arrow" data-weight="fill" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                PLAY AGAIN
            </button>
<button class="w-full bg-surface-container-high border-2 border-secondary py-5 rounded-xl text-secondary font-headline text-lg font-bold uppercase tracking-widest bottom-shelf-magenta active-press transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="share">share</span>
                SHARE SCORE
            </button>
</div>
</main>
<!-- Bottom Navigation (Shared Component: BottomNavBar) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 h-24 bg-[#191923]/90 backdrop-blur-xl rounded-t-[3rem] border-t-2 border-[#81ecff]/10 shadow-[0_-10px_40px_-5px_rgba(129,236,255,0.08)]">
<div class="flex items-center justify-center text-[#81ecff]/40 p-3 hover:text-[#81ecff] transition-all active:scale-90 duration-200 ease-out cursor-pointer">
<span class="material-symbols-outlined text-2xl" data-icon="grid_view">grid_view</span>
</div>
<div class="flex items-center justify-center text-[#81ecff]/40 p-3 hover:text-[#81ecff] transition-all active:scale-90 duration-200 ease-out cursor-pointer">
<span class="material-symbols-outlined text-2xl" data-icon="shield">shield</span>
</div>
<div class="relative flex items-center justify-center">
<div class="bg-[#00E5FF] p-4 rounded-full shadow-[0_4px_15px_rgba(129,236,255,0.4)] -translate-y-6 scale-110 border-4 border-[#080810] text-white active:scale-90 duration-200 ease-out cursor-pointer transition-all">
<span class="material-symbols-outlined text-3xl" data-icon="rocket_launch" data-weight="fill" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</div>
</div>
<div class="flex items-center justify-center text-[#81ecff]/40 p-3 hover:text-[#81ecff] transition-all active:scale-90 duration-200 ease-out cursor-pointer">
<span class="material-symbols-outlined text-2xl" data-icon="military_tech">military_tech</span>
</div>
<div class="flex items-center justify-center text-[#81ecff]/40 p-3 hover:text-[#81ecff] transition-all active:scale-90 duration-200 ease-out cursor-pointer">
<span class="material-symbols-outlined text-2xl" data-icon="settings">settings</span>
</div>
</nav>
<!-- Visual Artifacts -->
<div class="fixed top-1/2 left-4 w-px h-32 bg-gradient-to-b from-transparent via-primary/30 to-transparent opacity-50"></div>
<div class="fixed top-1/2 right-4 w-px h-32 bg-gradient-to-b from-transparent via-secondary/30 to-transparent opacity-50"></div>
</body></html>
