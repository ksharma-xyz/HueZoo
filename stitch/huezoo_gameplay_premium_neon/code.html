<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>HUEZOO - Gameplay</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",

                extend: {
                    colors: {
                        "surface-container": "#191923",

                        "background": "#0d0d16",

                        "outline-variant": "#484751",

                        "surface-dim": "#0d0d16",
                        "surface-container-lowest": "#000000",
                        "on-tertiary-fixed": "#484000",
                        "on-secondary": "#48001b",
                        "error": "#ff716c",
                        "outline": "#76747f",
                        "on-tertiary-fixed-variant": "#675c00",
                        "secondary-container": "#bc0051",
                        "on-secondary-fixed-variant": "#a20045",
                        "on-tertiary-container": "#5c5200",

                        "primary-fixed-dim": "#00d4ec",
                        "on-background": "#e7e4f0",
                        "tertiary-fixed": "#fde400",
                        "primary-container": "#00e3fd",

                        "tertiary-dim": "#edd600",

                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Space Grotesk"],
                        "label": ["Space Grotesk"],
                        "fredoka": ["Fredoka"],
                        "antonio": ["Antonio"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .kinetic-grid {
            background-image: 
                linear-gradient(to right, rgba(129, 236, 255, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(129, 236, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        .swatch-chip {
            box-shadow: 0 6px 0 0 rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .swatch-chip:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 0 rgba(0, 0, 0, 0.5);
        }
        .swatch-chip-outlier {
            box-shadow: 0 0 20px rgba(129, 236, 255, 0.4), 0 6px 0 0 rgba(0, 0, 0, 0.5);
            border: 2px solid rgba(255, 255, 255, 0.3);
        }
        .text-glow-cyan {
            text-shadow: 0 0 10px rgba(129, 236, 255, 0.6);
        }
        .slant-stat {
            transform: skewX(-12deg);
        }
        .italicized-rectangle {
            transform: skewX(-12deg);
            border-radius: 4px;
        }
        .kinetic-glyph {
            font-style: italic;
            letter-spacing: -0.05em;
        }
        body {
            min-height: max(884px, 100dvh);
        }
    </style>
</head>
<body class="bg-background text-on-background font-body selection:bg-primary selection:text-on-primary-container min-h-screen flex flex-col overflow-hidden">
<!-- Top Navigation -->
<header class="bg-[#0d0d16]/80 backdrop-blur-xl border-b-4 border-[#1a1a2e] shadow-[0_4px_0_0_rgba(0,0,0,0.3)] fixed top-0 z-50 flex justify-between items-center w-full px-6 h-16">
<div class="flex items-center gap-3">
<button class="text-cyan-400 active:scale-90 transition-transform">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<h1 class="font-headline tracking-tight font-black uppercase text-2xl italic text-cyan-400 drop-shadow-[0_0_8px_rgba(0,229,255,0.6)]">
            HU<span class="kinetic-glyph">EZ</span>OO
        </h1>
</div>
<div class="bg-surface-container-highest px-4 py-1 italicized-rectangle border-b-2 border-primary-dim">
<span class="font-antonio text-cyan-400 text-lg tracking-wider slant-stat block">1,250 GEMS</span>
</div>
</header>
<main class="flex-grow pt-24 pb-32 kinetic-grid flex flex-col items-center justify-center px-4 relative">
<!-- Game Header -->
<div class="text-center mb-8">
<h2 class="font-fredoka text-4xl font-bold text-primary tracking-tight mb-4 drop-shadow-[0_0_15px_rgba(129,236,255,0.4)] uppercase">IDENTIFY THE OUTLIER</h2>
<div class="inline-block bg-surface-container-high/80 backdrop-blur px-6 py-2 italicized-rectangle border-b-2 border-primary/40">
<p class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant slant-stat">CURRENT SENSITIVITY: <span class="text-primary font-bold">ΔE 1.8</span></p>
</div>
</div>
<!-- 4x4 Gameplay Grid -->
<div class="grid grid-cols-4 gap-3 p-4 bg-surface-container-low/80 backdrop-blur-md rounded-2xl shadow-[0_0_40px_rgba(0,0,0,0.5)] border border-white/5 relative">
<!-- Row 1 -->
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<!-- Row 2 -->
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<!-- The Outlier -->
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#323596] swatch-chip-outlier transition-all duration-75 ring-2 ring-primary/30"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<!-- Row 3 -->
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<!-- Row 4 -->
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
<button class="w-16 h-16 md:w-24 md:h-24 rounded-xl bg-[#2e3192] swatch-chip transition-all duration-75"></button>
</div>
<!-- Gameplay Stats Footer -->
<div class="mt-12 w-full max-w-md flex justify-between items-end gap-6">
<div class="flex-1">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2">TIME REMAINING</p>
<div class="bg-surface-container-high p-4 italicized-rectangle border-b-4 border-cyan-900 shadow-lg">
<span class="font-antonio text-4xl text-primary slant-stat block leading-none">0:42</span>
</div>
</div>
<div class="w-20"></div> <!-- Spacer for absolute nav button -->
<div class="flex-1 text-right">
<p class="font-label text-[10px] uppercase tracking-widest text-on-surface-variant mb-2">CALIBRATION</p>
<div class="bg-surface-container-high p-4 italicized-rectangle border-b-4 border-secondary-container shadow-lg">
<span class="font-antonio text-4xl text-secondary slant-stat block leading-none">12/50</span>
</div>
</div>
</div>
</main>
<!-- Updated Bottom Navigation based on Screen 26 -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-8 h-24 bg-[#191923]/90 backdrop-blur-xl rounded-t-[3rem] border-t-2 border-[#81ecff]/10 shadow-[0_-10px_40px_-5px_rgba(129,236,255,0.08)]">
<a class="flex items-center justify-center text-[#81ecff]/40 p-3 hover:text-[#81ecff] transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined text-2xl">home</span>
</a>
<a class="flex items-center justify-center text-[#81ecff]/40 p-3 hover:text-[#81ecff] transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined text-2xl">search</span>
</a>
<!-- Central Deploy Button (No text label) -->
<div class="relative flex items-center justify-center">
<div class="bg-[#00E5FF] p-4 rounded-full shadow-[0_4px_15px_rgba(129,236,255,0.4)] -translate-y-6 scale-110 border-4 border-[#080810] text-[#003840] active:scale-90 duration-200 ease-out cursor-pointer transition-all">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">rocket_launch</span>
</div>
</div>
<a class="flex items-center justify-center text-[#81ecff]/40 p-3 hover:text-[#81ecff] transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined text-2xl">military_tech</span>
</a>
<a class="flex items-center justify-center text-[#81ecff]/40 p-3 hover:text-[#81ecff] transition-all active:scale-90 duration-200 ease-out" href="#">
<span class="material-symbols-outlined text-2xl">settings</span>
</a>
</nav>
<!-- Ambient Glow Effects -->
<div class="fixed top-1/4 -left-20 w-64 h-64 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="fixed bottom-1/4 -right-20 w-64 h-64 bg-secondary/10 rounded-full blur-[100px] pointer-events-none"></div>
</body></html>
